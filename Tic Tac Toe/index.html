<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
body{
  font-family:Arial;
  background:#222;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin:20px;
}

.board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:5px;
}

.cell{
  width:100px;
  height:100px;
  background:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
}

.cell:hover{
  background:#444;
}

#status{
  margin-top:20px;
}
</style>

</head>

<body>

<h1>Tic Tac Toe ❌⭕</h1>

<div class="board" id="board"></div>

<h2 id="status">Player X Turn</h2>

<button onclick="restart()">Restart</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let cells = [];
let currentPlayer = "X";
let gameActive = true;

for(let i=0;i<9;i++){
  const cell = document.createElement("div");
  cell.classList.add("cell");
  cell.dataset.index = i;

  cell.addEventListener("click",handleClick);

  board.appendChild(cell);
  cells.push(cell);
}

const winPatterns = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function handleClick(){

  if(!gameActive || this.textContent !== "") return;

  this.textContent = currentPlayer;

  checkWinner();

  currentPlayer = currentPlayer === "X" ? "O" : "X";

  statusText.textContent = "Player " + currentPlayer + " Turn";
}

function checkWinner(){

  for(let pattern of winPatterns){

    let a = cells[pattern[0]].textContent;
    let b = cells[pattern[1]].textContent;
    let c = cells[pattern[2]].textContent;

    if(a && a === b && b === c){
      statusText.textContent = "Player " + a + " Wins!";
      gameActive = false;
      return;
    }

  }

  if(cells.every(cell => cell.textContent !== "")){
    statusText.textContent = "Draw!";
    gameActive = false;
  }

}

function restart(){

  cells.forEach(cell => cell.textContent = "");

  currentPlayer = "X";
  gameActive = true;

  statusText.textContent = "Player X Turn";

}
</script>

</body>
</html>
